#
# docker-compose.yml for Agent O
#
# Usage:
#   HERMES_UID=$(id -u) HERMES_GID=$(id -g) docker compose up -d
#
# Set HERMES_UID / HERMES_GID to the host user that owns ~/.hermes so
# files created inside the container stay readable/writable on the host.
# The s6-overlay stage2 hook remaps the internal `hermes` user to these
# values via usermod/groupmod; each supervised service then drops to that
# user via `s6-setuidgid`.
#
# Required secrets (add to ~/.hermes/.env):
#   API_SERVER_KEY=<your-auth-token>    — Bearer token for the REST API
#   OPENROUTER_API_KEY=<your-key>       — or another provider key
#
# Security notes:
#   - API_SERVER_KEY is mandatory when API_SERVER_HOST is set to 0.0.0.0.
#     Do not expose the API server without it.
#   - If you override entrypoint, keep `/init` as the first command in
#     the chain (or let docker use the image's default ENTRYPOINT,
#     which is `["/init", "/opt/hermes/docker/main-wrapper.sh"]`).
#     `/init` is s6-overlay's PID 1 — it runs the cont-init.d scripts
#     (chown, profile reconcile) and sets up the supervision tree before
#     any service starts. Bypassing it skips all of that setup.
#
services:
  gateway:
    build: .
    image: agent-o
    container_name: agent-o
    restart: unless-stopped
    network_mode: host
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      # REST API server — required for the company platform to connect.
      # API_SERVER_KEY is read from ~/.hermes/.env if set there.
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=${API_SERVER_PORT:-8642}
      - API_SERVER_KEY=${API_SERVER_KEY}
      # Model provider — set ONE in ~/.hermes/.env or as env vars here.
      # - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Microsoft Teams — uncomment and fill in to enable Teams gateway.
      # Register your bot at https://dev.botframework.com/ to get these values.
      # - TEAMS_CLIENT_ID=${TEAMS_CLIENT_ID}
      # - TEAMS_CLIENT_SECRET=${TEAMS_CLIENT_SECRET}
      # - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      # - TEAMS_ALLOWED_USERS=${TEAMS_ALLOWED_USERS}
      # - TEAMS_PORT=${TEAMS_PORT:-3978}
    command: ["gateway", "run"]
